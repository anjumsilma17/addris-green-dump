<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addrita's Green Dump</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f4f7ee;
    font-family: 'Caveat', cursive;
    padding-bottom: 4rem;
  }

  .header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
  }

  .header h1 {
    font-size: 42px;
    font-weight: 600;
    color: #2d5016;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 3px solid #2d5016;
    display: inline-block;
    padding-bottom: 4px;
  }

  .header p {
    font-size: 20px;
    color: #5a7a3a;
    margin-top: 10px;
  }

  .add-btn-wrap {
    text-align: center;
    margin: 1rem 0 2.5rem;
  }

  .add-btn {
    background: #3a6b1a;
    color: #f4f7ee;
    border: none;
    padding: 12px 32px;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    border-radius: 30px;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }
  .add-btn:hover { background: #2d5016; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 2.5rem;
    padding: 0 2.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .jar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .jar-svg-wrap {
    width: 160px;
    height: 180px;
    position: relative;
  }

  .jar-meta {
    margin-top: 10px;
    text-align: center;
    max-width: 165px;
  }

  .jar-caption {
    font-size: 19px;
    color: #2d5016;
    line-height: 1.3;
    display: block;
  }

  .jar-date {
    font-size: 14px;
    color: #7a9a5a;
    margin-top: 3px;
    display: block;
  }

  .delete-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(180,50,50,0.82);
    color: white;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-size: 14px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .jar-item:hover .delete-btn { display: flex; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal {
    background: #f4f7ee;
    border-radius: 18px;
    padding: 2rem;
    width: 340px;
    max-width: 94vw;
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-family: 'Caveat', cursive;
    border: 2px solid #3a6b1a;
  }

  .modal h2 {
    font-size: 26px;
    color: #2d5016;
    font-weight: 600;
  }

  .modal label {
    font-size: 16px;
    color: #5a7a3a;
    margin-bottom: 2px;
    display: block;
  }

  .modal input[type="text"],
  .modal input[type="date"],
  .modal textarea {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    border: 1.5px solid #3a6b1a;
    border-radius: 10px;
    padding: 8px 12px;
    background: #fff;
    color: #2d5016;
    width: 100%;
  }

  .modal input[type="date"] {
    color: #3a6b1a;
  }

  .modal textarea { height: 60px; resize: none; }

  .img-preview {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    border: 1.5px dashed #3a6b1a;
    display: none;
  }

  .file-label {
    display: block;
    background: #e8f0d8;
    border: 1.5px dashed #3a6b1a;
    border-radius: 10px;
    text-align: center;
    padding: 14px;
    font-size: 19px;
    color: #3a6b1a;
    cursor: pointer;
  }

  .file-label:hover { background: #d8e8c0; }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .modal-btns button {
    font-family: 'Caveat', cursive;
    font-size: 19px;
    padding: 7px 24px;
    border-radius: 22px;
    cursor: pointer;
    border: 1.5px solid #3a6b1a;
    transition: background 0.15s;
  }

  .btn-save { background: #3a6b1a; color: #f4f7ee; }
  .btn-save:hover { background: #2d5016; }
  .btn-cancel { background: transparent; color: #3a6b1a; }
  .btn-cancel:hover { background: #e0edc8; }

  .empty-msg {
    text-align: center;
    color: #7a9a5a;
    font-size: 22px;
    padding: 4rem;
    grid-column: 1/-1;
  }

  .count-badge {
    display: inline-block;
    background: #d4eab0;
    color: #3a6b1a;
    font-size: 15px;
    padding: 3px 14px;
    border-radius: 20px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Addrita's Green Dump</h1>
  <p>a little jar for every moment ✿</p>
  <span class="count-badge" id="count-badge">0 memories</span>
</div>

<div class="add-btn-wrap">
  <button class="add-btn" onclick="openModal()">+ add a memory</button>
</div>

<div class="grid" id="grid">
  <div class="empty-msg" id="empty-msg">your collection is empty — dump something beautiful here!</div>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <h2>new memory ✦</h2>
    <label class="file-label" for="file-input">tap to pick a photo</label>
    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="previewImg(event)">
    <img class="img-preview" id="img-preview" alt="preview">
    <div>
      <label>where were you?</label>
      <input type="text" id="caption-input" placeholder="just driving around..." maxlength="60">
    </div>
    <div>
      <label>when was it?</label>
      <input type="date" id="date-input">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
      <button class="btn-save" onclick="saveMemory()">save it</button>
    </div>
  </div>
</div>

<script>
const LID_COLORS = ['#f5a623','#e05a2b','#f78da7','#3ec6a7','#3a6b1a','#5ba8f5','#9b59b6','#e8c840','#e05a2b'];
let memories = [];
let currentImg = null;
let lidIdx = 0;

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('agd_memories');
    if (saved) {
      memories = JSON.parse(saved);
      lidIdx = memories.length;
    }
  } catch(e) {}
}

function saveToStorage() {
  try {
    localStorage.setItem('agd_memories', JSON.stringify(memories));
  } catch(e) {}
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function jarSVG(imgDataUrl, lidColor) {
  const id = 'clip' + Math.random().toString(36).slice(2,8);
  return `<svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg" width="160" height="180">
    <defs>
      <clipPath id="${id}">
        <path d="M30,52 Q28,50 28,48 L28,38 Q28,30 36,30 L124,30 Q132,30 132,38 L132,48 Q132,50 130,52 Q148,58 150,80 L150,148 Q150,168 130,168 L30,168 Q10,168 10,148 L10,80 Q12,58 30,52 Z"/>
      </clipPath>
    </defs>
    ${imgDataUrl
      ? `<image href="${imgDataUrl}" x="10" y="30" width="140" height="140" clip-path="url(#${id})" preserveAspectRatio="xMidYMid slice"/>`
      : `<path d="M30,52 Q28,50 28,48 L28,38 Q28,30 36,30 L124,30 Q132,30 132,38 L132,48 Q132,50 130,52 Q148,58 150,80 L150,148 Q150,168 130,168 L30,168 Q10,168 10,148 L10,80 Q12,58 30,52 Z" fill="#c8dba8" stroke="#3a6b1a" stroke-width="1.5"/>`
    }
    <path d="M30,52 Q28,50 28,48 L28,38 Q28,30 36,30 L124,30 Q132,30 132,38 L132,48 Q132,50 130,52 Q148,58 150,80 L150,148 Q150,168 130,168 L30,168 Q10,168 10,148 L10,80 Q12,58 30,52 Z" fill="none" stroke="#3a6b1a" stroke-width="2.5"/>
    <rect x="22" y="14" width="116" height="22" rx="8" fill="${lidColor}" stroke="#2d5016" stroke-width="1.5"/>
    ${[0,1,2,3,4,5,6,7].map(i => `<line x1="${34+i*14}" y1="17" x2="${34+i*14}" y2="33" stroke="#2d5016" stroke-width="1.2" opacity="0.5"/>`).join('')}
    <ellipse cx="80" cy="14" rx="58" ry="7" fill="${lidColor}" stroke="#2d5016" stroke-width="1.5"/>
  </svg>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('empty-msg');
  const countBadge = document.getElementById('count-badge');
  countBadge.textContent = memories.length === 1 ? '1 memory' : `${memories.length} memories`;

  if (memories.length === 0) {
    emptyMsg.style.display = 'block';
    grid.querySelectorAll('.jar-item').forEach(e => e.remove());
    return;
  }
  emptyMsg.style.display = 'none';
  grid.querySelectorAll('.jar-item').forEach(e => e.remove());

  memories.forEach((mem, i) => {
    const div = document.createElement('div');
    div.className = 'jar-item';
    div.innerHTML = `
      <div class="jar-svg-wrap">
        ${jarSVG(mem.img, mem.lid)}
        <button class="delete-btn" title="remove" onclick="removeMemory(${i})">✕</button>
      </div>
      <div class="jar-meta">
        <span class="jar-caption">${mem.caption || 'a moment'}</span>
        ${mem.date ? `<span class="jar-date">${formatDate(mem.date)}</span>` : ''}
      </div>
    `;
    grid.appendChild(div);
  });
}

function openModal() {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('caption-input').value = '';
  document.getElementById('date-input').value = new Date().toISOString().split('T')[0];
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview').src = '';
  document.getElementById('file-input').value = '';
  currentImg = null;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function previewImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    currentImg = ev.target.result;
    const prev = document.getElementById('img-preview');
    prev.src = currentImg;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveMemory() {
  const caption = document.getElementById('caption-input').value.trim();
  const date = document.getElementById('date-input').value;
  const lid = LID_COLORS[lidIdx % LID_COLORS.length];
  lidIdx++;
  memories.unshift({ img: currentImg, caption: caption || 'a moment', date, lid });
  saveToStorage();
  renderGrid();
  closeModal();
}

function removeMemory(i) {
  if (confirm('remove this memory?')) {
    memories.splice(i, 1);
    saveToStorage();
    renderGrid();
  }
}

loadFromStorage();
renderGrid();
</script>
</body>
</html>
